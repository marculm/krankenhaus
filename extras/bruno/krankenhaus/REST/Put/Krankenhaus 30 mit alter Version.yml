info:
  name: Krankenhaus 30 mit alter Version
  type: http
  seq: 3

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: If-Match
      value: '"-1"'
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
          "name": "Braunwald Klinik",
          "mitarbeiteranzahl": 67,
          "bettenanzahl": 420,
          "email": "braunwald@klinik.de"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "412"
    - expression: res.body.detail
      operator: contains
      value: Version

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
