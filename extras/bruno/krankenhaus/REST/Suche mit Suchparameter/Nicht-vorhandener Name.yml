info:
  name: Nicht-vorhandener Name
  type: http
  seq: 2

http:
  method: GET
  url: "{{restUrl}}?name=NichtVorhanden"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: NichtVorhanden
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
