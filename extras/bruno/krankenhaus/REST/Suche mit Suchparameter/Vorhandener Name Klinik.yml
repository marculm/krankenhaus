info:
  name: Vorhandener Name Klinik
  type: http
  seq: 1

http:
  method: GET
  url: "{{restUrl}}?name=Klinik"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: Klinik
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
