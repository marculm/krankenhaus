info:
  name: Suche name, email, ... vom Krankenhaus mit ID 1000
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |
      {
        krankenhaus(krankenhausId: "20") {
          id
          version
          name
          mitarbeiteranzahl
          bettenanzahl
          email
          adresse {
            strasse
            hausnummer
            plz
            ort
          }
        }
      }
    variables: |-
      {
        "krankenhausId": "1000"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.krankenhaus
      operator: isJson
    - expression: res.body.data.krankenhaus.id
      operator: gte
      value: "0"
    - expression: res.body.data.krankenhaus.version
      operator: gte
      value: "0"
    - expression: res.body.data.krankenhaus.name
      operator: isString
    - expression: res.body.data.krankenhaus.name
      operator: isNotEmpty
    - expression: res.body.data.krankenhaus.email
      operator: isString
    - expression: res.body.data.krankenhaus.email
      operator: isNotEmpty
    - expression: res.body.data.krankenhaus.mitarbeiteranzahl
      operator: gte
      value: "0"
    - expression: res.body.data.krankenhaus.bettenanzahl
      operator: gte
      value: "0"
    - expression: res.body.data.krankenhaus.adresse
      operator: isJson

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
